name: Pages

env:
  GITHUB_PAGES: 'true'

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Typst
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.15.0/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          typst --version
      - name: Install PDF fonts and inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes fonts-noto-cjk fonts-dejavu-core poppler-utils
          typst fonts | grep -F 'Noto Serif CJK SC'
          typst fonts | grep -F 'Noto Sans CJK SC'
          typst fonts | grep -F 'DejaVu Sans Mono'
      - name: Build demo
        run: pnpm --filter example-astro-blog build
      - name: Verify generated PDF
        run: |
          pdf='examples/astro-blog/dist/glyphweave/posts/hnsw-search-notes/article.pdf'
          test -s "$pdf"
          pdfinfo "$pdf" | grep -E '^Pages:[[:space:]]+[1-9][0-9]*$'
          pdffonts "$pdf" | tee pdf-fonts.txt
          grep -Eq 'NotoSerifCJK|Noto Serif CJK' pdf-fonts.txt
          grep -Eq 'NotoSansCJK|Noto Sans CJK' pdf-fonts.txt
          grep -Eq 'DejaVuSansMono|DejaVu Sans Mono' pdf-fonts.txt
      - run: pnpm --filter example-astro-blog pagefind
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/astro-blog/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
