name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Typst
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.15.0/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          typst --version
      - run: pnpm glyphweave doctor
      - run: pnpm run verify:demo
      - name: Verify cases equation structure
        run: |
          node -e 'const fs = require("node:fs"); const html = fs.readFileSync(".glyphweave/generated/posts/basic-post/content.html", "utf8"); const cases = html.match(/<mtable class="cases">([\s\S]*?)<\/mtable>/); if (!cases || (cases[1].match(/<mtr>/g) || []).length !== 2) process.exit(1)'
      - name: Verify SVG math fallback
        run: |
          printf "%s\n" "export default { math: { strategy: 'svg-frame' } }" > /tmp/glyphweave-svg.config.ts
          pnpm glyphweave build --config /tmp/glyphweave-svg.config.ts
          test "$(grep -o 'data-gw-renderer=\"typst-frame-svg\"' .glyphweave/generated/posts/basic-post/content.html | wc -l | tr -d ' ')" = "11"
